<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password - Paper Trading</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-main); color: var(--text-primary); margin: 0; font-family: 'Inter', sans-serif; }
    .auth-card { width: 100%; max-width: 400px; padding: 40px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow-xl); }
    .auth-logo h1 { font-family: 'Outfit'; font-size: 28px; margin-bottom: 8px; text-align: center; }
    .auth-logo p { color: var(--text-secondary); text-align: center; margin-bottom: 30px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: var(--text-secondary); }
    input { width: 100%; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 15px; transition: all 0.2s; outline: none; box-sizing: border-box; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--accent-glow); }
    .btn-primary { width: 100%; padding: 14px; background: var(--gradient-1); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px var(--accent-glow); }
    .btn-primary:active { transform: scale(0.98); }
    .status-msg { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 14px; display: none; }
    .status-success { background: var(--green-glow); color: var(--green); }
    .status-error { background: var(--red-glow); color: var(--red); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🚀 Paper Trading</h1>
      <p>Enter your new password below</p>
    </div>
    <div id="status-box" class="status-msg"></div>
    <form id="reset-form">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" id="reset-btn">Update Password</button>
    </form>
    <div style="text-align:center; margin-top:20px;">
      <a href="index.html" style="color:var(--text-secondary); font-size:13px; text-decoration:none;">Back to Login</a>
    </div>
  </div>

  <script>
    const API = window.location.hostname.includes('localhost') || window.location.hostname.includes('127.0.0.1')
      ? `http://${window.location.hostname}:5000/api`
      : '/api';
    
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      showStatus('Invalid or missing token link.', 'error');
      document.getElementById('reset-btn').disabled = true;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status-box');
      el.textContent = msg;
      el.style.display = 'block';
      el.className = 'status-msg ' + (type === 'success' ? 'status-success' : 'status-error');
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        return showStatus('Passwords do not match!', 'error');
      }

      try {
        const btn = document.getElementById('reset-btn');
        btn.textContent = 'Updating...';
        btn.disabled = true;

        const r = await fetch(`${API}/auth/reset-password/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const d = await r.json();
        if (r.ok) {
          showStatus('Password updated! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'index.html', 3000);
        } else {
          showStatus(d.error || 'Reset failed', 'error');
          btn.textContent = 'Update Password';
          btn.disabled = false;
        }
      } catch (err) {
        showStatus('Connection error', 'error');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
